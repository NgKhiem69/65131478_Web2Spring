<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: grid;
            grid-template-areas:
                "h h"
                "s c"
                "f f";
            grid-template-columns: 220px 1fr;
            min-height: 100vh;
            background: #f1f5f9;
            margin: 0;
        }

        header {
            grid-area: h;
            background: #1976d2;
            color: white;
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
        }

        aside {
            grid-area: s;
            background: #1e293b;
        }

        aside a {
            display: block;
            color: #cbd5e1;
            padding: 12px 20px;
            text-decoration: none;
            transition: background-color 0.3s, color 0.3s;
        }

        aside a:hover {
            background: #334155;
            color: white;
        }

        main {
            grid-area: c;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-top: 0;
            color: #333;
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 15px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.3s;
            font-weight: 500;
        }
        
        .btn:hover {
            opacity: 0.85;
        }

        .btn-add {
            background: #1976d2;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #1976d2;
            color: white;
        }

        td, th {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:nth-child(even) {
            background: #f8fafc;
        }

        .view { background: #16a34a; }
        .edit { background: #f59e0b; }
        .delete { background: #dc2626; }

        footer {
            grid-area: f;
            text-align: center;
            padding: 15px;
            background: #1e293b;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>👨‍🎓 Student Management</header>

    <aside>
        <a href="/">Dashboard</a>
        <a href="/student/all">Student List</a>
        <a href="/student/new">Add Student</a>
    </aside>

    <main>
        <div class="card">
            <h2>Student List</h2>

            <a class="btn btn-add" href="/student/new">+ Add New</a>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Group</th>
                        <th colspan="3">Action</th>
                    </tr>
                </thead>
                
                <tbody>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.id}"></td>
                        <td th:text="${s.name}"></td>
                        <td th:text="${s.groupId}"></td>

                        <td>
                            <a class="btn view" th:href="@{/student/view/{id}(id=${s.id})}">View</a>
                        </td>
                        <td>
                            <a class="btn edit" th:href="@{/student/edit/{id}(id=${s.id})}">Edit</a>
                        </td>
                        <td>
                            <a class="btn delete" th:href="@{/student/delete/{id}(id=${s.id})}">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        ©2026 FIT.NTU
    </footer>

</body>
</html>
