<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>index</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            display: grid;
            grid-template-areas:
                "header header"
                "sidebar content"
                "footer footer";
            grid-template-rows: 70px 1fr 50px;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
            background: #f1f5f9;
        }

        /* HEADER */
        header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            background: linear-gradient(90deg, #1976d2, #42a5f5);
            color: white;
        }

        .logo {
            font-weight: bold;
            font-size: 16px;
        }

        .user {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
        }

        /* SIDEBAR */
        aside {
            grid-area: sidebar;
            background: #1e293b;
            color: white;
        }

        aside ul {
            list-style: none;
        }

        aside ul li {
            border-bottom: 1px solid #334155;
        }

        aside a {
            text-decoration: none;
            color: #cbd5e1;
            display: block;
            padding: 14px 18px;
            transition: 0.3s;
        }

        aside a:hover {
            background: #334155;
            color: white;
            padding-left: 25px;
        }

        /* MAIN */
        main {
            grid-area: content;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 15px;
            color: #1e293b;
        }

        .btn {
            display: inline-block;
            padding: 8px 14px;
            background: #1976d2;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #125ea7;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #1976d2;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f1f5f9;
        }

        tr:hover {
            background: #e3f2fd;
        }

        /* ACTION BUTTON */
        .action a {
            padding: 5px 8px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
        }

        .view { background: #22c55e; color: white; }
        .edit { background: #f59e0b; color: white; }
        .delete { background: #ef4444; color: white; }

        /* FOOTER */
        footer {
            grid-area: footer;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e293b;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        ĐH NHA TRANG - CNTT
    </div>

    <div class="user">
        👤 <span th:text="${ten}">User</span>
    </div>
</header>

<aside>
    <ul>
        
        <li><a href="/?page=topic">📚 Topic List</a></li>
		<li><a href="/topic/new">➕ Add Topic</a></li>
		<li><a href="/?page=student">👨‍🎓 Student List</a></li>
		<li><a href="/student/new">➕ Add Student</a></li>
    </ul>
</aside>


    <main>
<div class="card">

    <!-- 🔵 TOPIC -->
    <div th:if="${page == 'topic'}">
        <h2>📚 Topic List</h2>

        <a class="btn" href="/topic/new">+ Add Topic</a>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Supervisor</th>
                    <th>Type</th>
                    <th colspan="3">Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="t : ${topics}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.topicName}"></td>
                    <td th:text="${t.supervisorId}"></td>
                    <td th:text="${t.topicType}"></td>

                    <td><a class="view" th:href="@{/?page=topic-view&id={id}(id=${t.id})}">View</a></td>
                    <td><a class="edit" th:href="@{/topic/edit/{id}(id=${t.id})}">Edit</a></td>
                    <td><a class="delete" th:href="@{/topic/delete/{id}(id=${t.id})}">Delete</a></td>
                </tr>
            </tbody>
        </table>
    </div>


    <!-- 🟢 STUDENT -->
    <div th:if="${page == 'student'}">
        <h2>👨‍🎓 Student List</h2>

        <a class="btn" href="/student/new">+ Add Student</a>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Group</th>
                    <th colspan="3">Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.groupId}"></td>

                    <td><<a class="view" th:href="@{/?page=student-view&id={id}(id=${s.id})}">View</a></td>
                    <td><a class="edit" th:href="@{/student/edit/{id}(id=${s.id})}">Edit</a></td>
                    <td><a class="delete" th:href="@{/student/delete/{id}(id=${s.id})}">Delete</a></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</main>


<footer>
    ©2026 - FIT.NTU | <span th:text="${ten}">Student</span>
</footer>

</body>
</html>
