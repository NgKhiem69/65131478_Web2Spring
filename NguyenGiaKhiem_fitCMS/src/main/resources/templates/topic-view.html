<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="~{layout :: layout(~{::main})}">

    <main>
        <h2>Chi tiết Topic</h2>

        <!-- Nếu có topic -->
        <div th:if="${topic != null}" 
             style="background: #f4f4f4; padding: 15px; border-radius: 5px;">

            <p><strong>ID:</strong> 
                <span th:text="${topic.id}"></span>
            </p>

            <p><strong>Topic Name:</strong> 
                <span th:text="${topic.topicName}"></span>
            </p>

            <p><strong>Description:</strong> 
                <span th:text="${topic.topicDescription}"></span>
            </p>

            <p><strong>Supervisor ID:</strong> 
                <span th:text="${topic.supervisorId}"></span>
            </p>

            <p><strong>Type:</strong> 
                <span th:text="${topic.topicType}"></span>
            </p>
        </div>

        <!-- Nếu không có -->
        <div th:if="${topic == null}">
            <p style="color: red;">Không tìm thấy topic này!</p>
        </div>

        <br>

        <a th:href="@{/topic/all}">
            <button>Quay lại danh sách</button>
        </a>

    </main>

</div>

</body>
</html>
