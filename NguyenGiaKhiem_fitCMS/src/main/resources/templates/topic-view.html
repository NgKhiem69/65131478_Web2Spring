<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Topic View</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        .detail-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #1976d2; /* Đường viền xanh làm điểm nhấn */
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .detail-row {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .detail-label {
            font-weight: bold;
            color: #555;
            display: inline-block;
            width: 120px; /* Cố định chiều rộng để cột thông tin thẳng hàng nhau */
        }

        .detail-value {
            color: #000;
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #757575;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s;
            text-align: center;
        }

        .btn-back:hover {
            background-color: #616161;
        }
    </style>
</head>
<body>

    <div class="detail-card">
        <h2>Topic Detail</h2>

        <div class="detail-row">
            <span class="detail-label">Id:</span>
            <span class="detail-value" th:text="${topic.id}"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Name:</span>
            <span class="detail-value" th:text="${topic.topicName}"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Description:</span>
            <span class="detail-value" th:text="${topic.topicDescription}"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Supervisor:</span>
            <span class="detail-value" th:text="${topic.supervisorId}"></span>
        </div>

        <div class="detail-row">
            <span class="detail-label">Type:</span>
            <span class="detail-value" th:text="${topic.topicType}"></span>
        </div>

        <a th:href="@{/topic/all}" class="btn-back">Quay lại (Back)</a>
    </div>

</body>
</html>
