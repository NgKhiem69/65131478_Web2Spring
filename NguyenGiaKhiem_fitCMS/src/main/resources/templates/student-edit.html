<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Giữ khung nhập không bị tràn viền */
        }

        input:focus {
            border-color: #f59e0b;
            outline: none;
        }

        /* Làm mờ và đổi trỏ chuột cho ô ID không được sửa */
        input[readonly] {
            background-color: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
            border-color: #cbd5e1;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #f59e0b; /* Màu cam đặc trưng cho hành động Update */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #d97706;
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-cancel:hover {
            color: #333;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Edit Student</h2>

        <form th:action="@{/student/save}" method="post">
            <input type="text" name="id" th:value="${student.id}" readonly title="ID cannot be changed">
            <input type="text" name="name" th:value="${student.name}" placeholder="Name" required>
            <input type="text" name="groupId" th:value="${student.groupId}" placeholder="Group ID" required>

            <button type="submit">Update</button>
        </form>

        <a class="btn-cancel" th:href="@{/student/all}">Cancel</a>
    </div>

</body>
</html>
