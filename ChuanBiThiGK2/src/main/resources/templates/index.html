<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>Trang chủ - Tin Tức Mới Nhất</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-primary">Tin Tức Mới Nhất</h1>
        <a th:href="@{/admin/tintuc}" class="btn btn-outline-secondary">Vào trang Quản trị (Admin)</a>
    </div>

    <div class="row">
        <div class="col-md-6 col-lg-4 mb-4" th:each="tin : ${tinTucMoiNhat}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <span class="badge bg-info text-dark mb-2" 
                          th:text="${tin.loaiTinTuc != null ? tin.loaiTinTuc.tenLoai : 'Chưa phân loại'}"></span>
                    
                    <h5 class="card-title" th:text="${tin.tieuDe}">Tiêu đề bài viết</h5>
                    
                    <p class="card-text text-muted" 
                       th:text="${tin.noiDung != null ? (#strings.length(tin.noiDung) > 100 ? #strings.substring(tin.noiDung, 0, 100) + '...' : tin.noiDung) : 'Đang cập nhật nội dung...'}"></p>
                </div>
                <div class="card-footer bg-white border-0">
                    <button class="btn btn-sm btn-primary w-100">Đọc tiếp</button>
                </div>
            </div>
        </div>
        
        <div th:if="${#lists.isEmpty(tinTucMoiNhat)}" class="col-12 text-center text-muted mt-5">
            <p>Chưa có bài viết nào. Hãy vào trang Quản trị để thêm bài viết mới nhé!</p>
        </div>
    </div>
</div>

</body>
</html>
