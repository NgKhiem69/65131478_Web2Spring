<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" /> <title>Quản lý Tin Tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" /> </head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Danh sách Tin tức</h3>
            <div>
                <a th:href="@{/}" class="btn btn-secondary btn-sm me-2">Về Trang chủ</a>
                <a th:href="@{/admin/tintuc/add}" class="btn btn-success btn-sm">+ Thêm bài viết mới</a>
            </div>
        </div>
        
        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-secondary">
                    <tr>
                        <th width="5%">ID</th>
                        <th width="35%">Tiêu đề</th>
                        <th width="20%">Loại tin</th>
                        <th width="25%">Nội dung (tóm tắt)</th>
                        <th width="15%" class="text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tin : ${listTinTuc}">
                        <td th:text="${tin.id}">1</td>
                        <td class="fw-bold" th:text="${tin.tieuDe}">Tiêu đề</td>
                        <td th:text="${tin.loaiTinTuc != null ? tin.loaiTinTuc.tenLoai : 'N/A'}">Thể loại</td>
                        <td th:text="${tin.noiDung != null ? (#strings.length(tin.noiDung) > 50 ? #strings.substring(tin.noiDung, 0, 50) + '...' : tin.noiDung) : ''}">Nội dung</td>
                        <td class="text-center">
                            <a th:href="@{/admin/tintuc/edit/{id}(id=${tin.id})}" class="btn btn-warning btn-sm">Sửa</a>
                            <a th:href="@{/admin/tintuc/delete/{id}(id=${tin.id})}" class="btn btn-danger btn-sm" 
                               onclick="return confirm('Bạn có chắc chắn muốn xóa bài viết này?');">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listTinTuc)}">
                        <td colspan="5" class="text-center text-muted">Chưa có dữ liệu. Hãy thêm mới!</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
