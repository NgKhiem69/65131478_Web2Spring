<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" /> <title>Cập nhật Tin Tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" /> </head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${tintuc.id == null ? 'Thêm Bài Viết Mới' : 'Sửa Bài Viết'}"></h4>
                </div>
                
                <div class="card-body">
                    <form th:action="@{/admin/tintuc/save}" th:object="${tintuc}" method="post">
                        
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Loại tin tức</label>
                            <select class="form-select" th:field="*{loaiTinTuc.id}" required>
                                <option value="" disabled selected>-- Chọn thể loại --</option>
                                <option th:each="loai : ${listLoai}" 
                                        th:value="${loai.id}" 
                                        th:text="${loai.tenLoai}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tiêu đề bài viết</label>
                            <input type="text" class="form-control" th:field="*{tieuDe}" required 
                                   placeholder="Nhập tiêu đề..." /> 
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Nội dung</label>
                            <textarea class="form-control" th:field="*{noiDung}" rows="6" required
                                      placeholder="Viết nội dung bài viết ở đây..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/tintuc}" class="btn btn-outline-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-primary px-4">Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
