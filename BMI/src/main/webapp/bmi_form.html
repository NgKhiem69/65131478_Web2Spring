<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tính BMI</title>
<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="card">
    <h2>TÍNH CHỈ SỐ BMI</h2>

    <form action="BMI" method="post">
        Chiều cao (m):
        <input type="text" name="height" placeholder="Ví dụ: 1.7" required>

        Cân nặng (kg):
        <input type="text" name="weight" placeholder="Ví dụ: 65" required>

        <button type="submit">TÍNH BMI</button>
    </form>
</div>

</body>
</html>
