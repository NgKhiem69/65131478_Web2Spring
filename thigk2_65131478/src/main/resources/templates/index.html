<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách tin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h2 class="text-center text-primary mb-4">HỆ THỐNG QUẢN LÝ TIN TỨC</h2>
        <div class="row">
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white fw-bold">
                        Danh mục Thể loại
                    </div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="tl : ${listTheLoai}">
                            <a th:href="@{/tin/theloai(id=${tl.id})}" th:text="${tl.tenTheLoai}" class="text-decoration-none text-dark d-block"></a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <table class="table table-hover table-bordered align-middle">
                            <thead class="table-primary text-center">
                                <tr>
                                    <th>ID</th>
                                    <th>Tiêu đề</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="t : ${listTin}">
                                    <td class="text-center" th:text="${t.id}"></td>
                                    <td th:text="${t.tieuDe}"></td>
                                    <td class="text-center">
                                        <a th:href="@{'/tin/chitiet/' + ${t.id}}" class="btn btn-sm btn-info text-white">Xem chi tiết</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
