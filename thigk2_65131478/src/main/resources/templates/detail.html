<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết tin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <h2 class="card-title text-primary mb-3" th:text="${tin.tieuDe}"></h2>
                <hr>
                <p class="card-text mt-4 fs-5" th:text="${tin.noiDung}"></p>
                <div class="mt-5">
                    <a th:href="@{/tin}" class="btn btn-secondary px-4">Quay lại</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
