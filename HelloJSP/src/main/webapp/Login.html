<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<!-- Link CSS chung -->
<link rel="stylesheet" href="css/Sofm.css">

</head>

<body>

<div class="card">

    <h2>User Login</h2>

    <form action="Login.jsp" method="post">

        <div class="row">
            <div class="label">Username</div>
            <input type="text" name="username" class="value" required>
        </div>

        <div class="row">
            <div class="label">Password</div>
            <input type="password" name="password" class="value" required>
        </div>

        <br>

        <div style="text-align:center;">
            <input type="submit" value="Login" class="badge">
        </div>

    </form>

</div>

</body>
</html>
