<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Profile</title>

<!-- Link CSS -->
<link rel="stylesheet" href="css/Sofm.css">

</head>

<body>

<div class="card">

    <div class="avatar">
        <img src="Image/soctest.jpg" alt="avatar">
    </div>

    <h2>Nguyen Gia Khiem</h2>

    <div class="info">
        <div class="row">
            <div class="label">Ngành</div>
            <div class="value">Công nghệ thông tin</div>
        </div>

        <div class="row">
            <div class="label">Định hướng</div>
            <div class="value">Web + AI</div>
        </div>

        <div class="row">
            <div class="label">Mục tiêu</div>
            <div class="value">Developer quốc tế</div>
        </div>
    </div>

    <div class="badges">
        <span class="badge">Java</span>
        <span class="badge">Servlet</span>
        <span class="badge">Web Dev</span>
        <span class="badge">SQL</span>
    </div>

    

</div>

</body>
</html>
